{% extends 'base.html' %}

{% block title %}Student dashboard{% endblock %}

{% block content %}
<header class="mb-6">
  <h1 class="text-2xl font-semibold text-slate-800">Student dashboard</h1>
  <p class="mt-1 text-sm text-slate-500">A read-only view of your own records.</p>
</header>

<div class="grid gap-4 sm:grid-cols-2">
  <div class="rounded-lg border border-slate-200 bg-white p-5">
    <h2 class="font-medium text-slate-800">My Records (read-only)</h2>
    <p class="mt-1 text-sm text-slate-500">View the records counselors have recorded for you.</p>
    <a href="{% url 'records:list' %}"
       class="mt-4 inline-block rounded-md bg-blue-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-700">Open records</a>
  </div>
</div>
{% endblock %}
